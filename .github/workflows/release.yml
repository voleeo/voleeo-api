name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_TERM_COLOR: always

jobs:
  version:
    name: Compute next version
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.bump.outputs.skip }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Determine bump
        id: bump
        run: |
          current=$(git describe --tags --abbrev=0 --match 'v[0-9]*' 2>/dev/null || echo none)
          if [ "$current" = none ]; then
            next=$(git cliff --bumped-version)
          else
            next=$(git cliff "$current"..HEAD --bumped-version)
          fi
          echo "current=$current next=$next"
          if [ "$next" = "$current" ]; then
            echo "No releasable commits since $current — skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$next" >> "$GITHUB_OUTPUT"

  create-release:
    name: Create draft release
    needs: version
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Create draft release with generated notes
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          git cliff --unreleased --tag "$VERSION" --strip all -o notes.md
          release_id=$(gh api "repos/$GITHUB_REPOSITORY/releases" \
            -f tag_name="$VERSION" -f name="Voleeo $VERSION" \
            -f target_commitish="$GITHUB_SHA" -F draft=true -F body=@notes.md \
            --jq .id)
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.platform }} ${{ matrix.args }})
    needs: [version, create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu
          - platform: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            args: --target aarch64-unknown-linux-gnu
          # NSIS only on Windows — WiX/MSI (light.exe) is flaky in CI and MSI is
          # only needed for enterprise GPO deploys. NSIS covers install + updater.
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis
          - platform: windows-11-arm
            target: aarch64-pc-windows-msvc
            args: --target aarch64-pc-windows-msvc --bundles nsis

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7

      - name: Install Tauri system dependencies (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf xdg-utils \
            libfuse2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Inject release version into tauri.conf.json
        shell: bash
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          jq --arg v "${VERSION#v}" '.version = $v' src-tauri/tauri.conf.json > tauri.conf.tmp
          mv tauri.conf.tmp src-tauri/tauri.conf.json

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VOLEEO_TARGET: ${{ matrix.target }} # beforeBuildCommand builds the sidecar for this triple
          # linuxdeploy (an AppImage) can't FUSE-mount on CI runners — extract-and-run instead
          APPIMAGE_EXTRACT_AND_RUN: "1"
          # Updater signing - tauri-action signs bundles and uploads latest.json + .sig files
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple signing + notarization (macOS only; tauri-action imports the cert into a keychain itself)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish:
    name: Publish release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Undraft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        run: gh api -X PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" -F draft=false --jq .html_url

      # Redeploy the marketing site
      - name: Trigger Web redeploy
        env:
          GH_TOKEN: ${{ secrets.WEB_DEPLOY_PAT }}
        run: gh api -X POST repos/voleeo/voleeo-web/dispatches -f event_type=release-published
