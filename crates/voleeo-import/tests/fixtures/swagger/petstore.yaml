swagger: "2.0"
info:
  title: Swagger Petstore
  version: 1.0.0
host: petstore.swagger.io
basePath: /v2
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json
securityDefinitions:
  api_key:
    type: apiKey
    name: api_key
    in: header
  petstore_auth:
    type: oauth2
    flow: implicit
    authorizationUrl: https://petstore.swagger.io/oauth/authorize
    scopes:
      write:pets: modify pets in your account
      read:pets: read your pets
security:
  - api_key: []
paths:
  /pet:
    post:
      summary: Add a new pet to the store
      operationId: addPet
      consumes:
        - application/json
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/Pet'
      security:
        - petstore_auth:
            - write:pets
  /pet/{petId}:
    get:
      summary: Find pet by ID
      operationId: getPetById
      parameters:
        - name: petId
          in: path
          required: true
          type: integer
          format: int64
  /pet/{petId}/uploadImage:
    post:
      summary: uploads an image
      operationId: uploadFile
      consumes:
        - multipart/form-data
      parameters:
        - name: petId
          in: path
          required: true
          type: integer
        - name: additionalMetadata
          in: formData
          required: false
          type: string
        - name: file
          in: formData
          required: false
          type: file
  /store/inventory:
    get:
      summary: Returns pet inventories by status
      operationId: getInventory
      parameters:
        - name: status
          in: query
          required: false
          type: string
definitions:
  Category:
    type: object
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
  Pet:
    type: object
    required:
      - name
    properties:
      id:
        type: integer
        format: int64
      category:
        $ref: '#/definitions/Category'
      name:
        type: string
        example: doggie
      status:
        type: string
        enum:
          - available
          - pending
          - sold
